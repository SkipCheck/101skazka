version: '3.8'

services:
  web:
    build: .
    container_name: skazka_web
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_NAME=skazkadb
      - DB_USER=root
      - DB_PASSWORD=root

  db:
    image: mariadb:10.4
    container_name: skazka_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=skazkadb
      - MYSQL_USER=skazka_user
      - MYSQL_PASSWORD=skazka_pass
    volumes:
      - ./skazkadb.sql:/docker-entrypoint-initdb.d/01-init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

volumes:
  db_data: